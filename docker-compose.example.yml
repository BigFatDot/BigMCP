# BigMCP Docker Compose - Self-Hosted Community Edition
# Copy this file to docker-compose.yml and configure your .env

version: '3.8'

services:
  # Frontend - BigMCP Web UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bigmcp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - bigmcp-network

  # Qdrant Vector Database (for AI composition)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: bigmcp-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped
    networks:
      - bigmcp-network

  # Backend API - BigMCP Platform
  backend:
    build:
      context: ./mcp-registry
      dockerfile: Dockerfile
    container_name: bigmcp-gateway
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # LLM API configuration (Mistral, OpenAI, etc.)
      - LLM_API_URL=${LLM_API_URL:-https://api.mistral.ai/v1}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-mistral-small-latest}

      # Database configuration
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-bigmcp}:${POSTGRES_PASSWORD:-bigmcp_dev_password}@postgres:5432/${POSTGRES_DB:-bigmcp}

      # Security keys (generate with: python -c "import secrets; print(secrets.token_urlsafe(32))")
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SECRET_KEY=${SECRET_KEY}

      # MCP Registry configuration
      - MCP_REGISTRY_PORT=8001
      - MCP_SERVERS_CONFIG_PATH=./conf/mcp_servers.json

      # Vector store configuration (Qdrant for AI composition)
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-mistral-embed}
      - VECTOR_STORE_PATH=./data/vector_store

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # Performance tuning
      - MAX_WORKERS=${MAX_WORKERS:-2}
      - CACHE_TTL=${CACHE_TTL:-1800}

      # Domain for redirects (your domain)
      - DOMAIN=${DOMAIN:-localhost}

      # Optional: Email Service (SMTP)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-BigMCP}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-false}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-true}

      # Python optimization
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUTF8=1
    volumes:
      - ./mcp-registry/embeddings_cache:/app/embeddings_cache
      - ./mcp-registry/data:/app/data
      - ./mcp-registry/logs:/app/logs
      - ./mcp-registry/conf:/app/conf
    restart: unless-stopped
    networks:
      - bigmcp-network
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/mcp/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: bigmcp-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-bigmcp}
      - POSTGRES_USER=${POSTGRES_USER:-bigmcp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-bigmcp_dev_password}
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - effective_cache_size=128MB
      - -c
      - max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./mcp-registry/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - bigmcp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bigmcp}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  bigmcp-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
