<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .orange { fill: #D97757; }
      .white { fill: #ffffff; }
      .anthracite { fill: #1f2937; }
      .text-font { 
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif; 
        font-weight: 800; 
        font-size: 20px;
        letter-spacing: -0.01em;
      }
      .orbit {
        animation: rotate 60s linear infinite;
        transform-origin: 20px 20px;
      }
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </defs>
  
  <!-- Logo circulaire centré verticalement -->
  <g transform="translate(10, 10)">
    <!-- Cercle central orange (centre: 20,20 - rayon: 20) -->
    <circle cx="20" cy="20" r="20" class="orange"/>
    
    <!-- Groupe des billes en orbite -->
    <g class="orbit">
      <!-- 12 billes blanches avec centres exactement sur le périmètre du cercle orange -->
      
      <!-- Bille 0 - 12h (angle: -90°) -->
      <circle cx="20" cy="0" r="2.5" class="white"/>
      
      <!-- Bille 1 - 1h (angle: -60°) -->
      <circle cx="30" cy="2.68" r="2.5" class="white"/>
      
      <!-- Bille 2 - 2h (angle: -30°) -->
      <circle cx="37.32" cy="10" r="2.5" class="white"/>
      
      <!-- Bille 3 - 3h (angle: 0°) -->
      <circle cx="40" cy="20" r="2.5" class="white"/>
      
      <!-- Bille 4 - 4h (angle: 30°) -->
      <circle cx="37.32" cy="30" r="2.5" class="white"/>
      
      <!-- Bille 5 - 5h (angle: 60°) -->
      <circle cx="30" cy="37.32" r="2.5" class="white"/>
      
      <!-- Bille 6 - 6h (angle: 90°) -->
      <circle cx="20" cy="40" r="2.5" class="white"/>
      
      <!-- Bille 7 - 7h (angle: 120°) -->
      <circle cx="10" cy="37.32" r="2.5" class="white"/>
      
      <!-- Bille 8 - 8h (angle: 150°) -->
      <circle cx="2.68" cy="30" r="2.5" class="white"/>
      
      <!-- Bille 9 - 9h (angle: 180°) -->
      <circle cx="0" cy="20" r="2.5" class="white"/>
      
      <!-- Bille 10 - 10h (angle: 210°) -->
      <circle cx="2.68" cy="10" r="2.5" class="white"/>
      
      <!-- Bille 11 - 11h (angle: 240°) -->
      <circle cx="10" cy="2.68" r="2.5" class="white"/>
    </g>
  </g>
  
  <!-- Texte BigMCP -->
  <text x="60" y="37" class="text-font">
    e
  </text>
</svg>