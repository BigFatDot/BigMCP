[pytest]
# Pytest configuration for MCPHub authentication tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration
asyncio_mode = auto

# Test output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-branch

# Markers for test categorization
markers =
    asyncio: mark test as async test
    unit: mark test as unit test
    integration: mark test as integration test
    slow: mark test as slow running test
    auth: mark test as authentication test
    api_key: mark test as API key test
    gateway: mark test as MCP gateway test
    requires_db: mark test as requiring database

# Test paths
testpaths = tests

# Ignore patterns
norecursedirs = .git .tox dist build *.egg __pycache__

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage settings
[coverage:run]
source = app
omit =
    */tests/*
    */conftest.py
    */__pycache__/*
    */venv/*
    */migrations/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
